<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Martha Tan Mercado - Email Signature</title>

<style>
    body{
        margin:40px;
        background:#ffffff;
        font-family:Arial, Helvetica, sans-serif;
    }

    .instructions{
        max-width:700px;
        margin-bottom:30px;
        font-size:14px;
        color:#555;
        line-height:1.6;
    }

    .signature{
        display:inline-block;
        line-height:1.25;
    }

    .name{
        font-family:Georgia, serif;
        font-size:11pt;
        font-weight:bold;
        color:#000822;
    }

    .position{
        font-family:"Arial Narrow", Arial, Helvetica, sans-serif;
        font-size:8pt;
        color:#444444;
    }

    .logo{
        margin:8px 0;
    }

    .logo img{
        width:235px;
        height:auto;
        display:block;
        border:0;
    }

    .website{
        font-family:Georgia, serif;
        font-size:8pt;
    }

    .website a{
        color:#000000;
        text-decoration:none;
    }

    .copyButton{
        margin-top:25px;
        padding:10px 18px;
        border:none;
        border-radius:6px;
        background:#000822;
        color:white;
        cursor:pointer;
        font-size:14px;
    }

    .copyButton:hover{
        opacity:.9;
    }
</style>
</head>

<body>

<div class="instructions">
    <strong>AllConnect Gmail Signature</strong><br><br>

    Highlight the signature below and copy it (<strong>Ctrl + C</strong>),
    then go to <strong>Gmail → Settings → Signature</strong> and paste it there.
</div>

<div class="signature" id="signature">

    <div class="name">
        Martha Tan Mercado
    </div>

    <div class="position">
        Business Operations Manager
    </div>

    <div class="logo">
        <img src="https://mmerc0901.github.io/allconnect-assets/AllConnect_Logo_Signature.png" alt="AllConnect">
    </div>

    <div class="website">
        <a href="https://www.allconnectph.com">
            www.allconnectph.com
        </a>
    </div>

</div>

</body>
</html>
